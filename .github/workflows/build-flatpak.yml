name: Build Flatpak

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flatpak \
            flatpak-builder \
            openjdk-17-jre-headless \
            g++ \
            make \
            cmake \
            unzip \
            python3-pip \
            python3-venv \
            curl \
            ca-certificates \
            qt6-base-dev \
            qt6-base-dev-tools

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install mold linker
        run: |
          curl -fsSL "https://github.com/rui314/mold/releases/download/v2.41.0/mold-2.41.0-x86_64-linux.tar.gz" \
            | sudo tar xz -C /usr/local --strip-components=1 --no-same-owner
          sudo ldconfig

      - name: Run setup script
        run: bash setup.sh

      - name: Build flatpak
        run: bash build-flatpak.sh

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhesis-flatpak
          path: rhesis.flatpak
          if-no-files-found: error
